                    { name: "조우석", role: "화물·수출계 (협업검사 지원)", ext: "3658" },
                    { name: "김진호", role: "화물·수출계 (ZBV운용, 폐기입회)", ext: "3659" }
                ]
            },
            {
                deptName: "원산지증명서 담당 (인천세관)",
                prefix: "032-452-",
                members: [
                    { name: "조은진", role: "원산지증명서 담당", ext: "3677" },
                    { name: "조현지", role: "원산지증명서 담당", ext: "3187" },
                    { name: "이수영", role: "원산지증명서 담당", ext: "3174" },
                    { name: "이소영", role: "원산지증명서 담당", ext: "3163" },
                    { name: "김선화", role: "원산지증명서 담당", ext: "3636" },
                    { name: "이유미", role: "원산지증명서 담당", ext: "3172" },
                    { name: "황진선", role: "원산지증명서 담당", ext: "3162" },
                    { name: "김유미", role: "원산지증명서 담당", ext: "3394" }
                ]
            },{
                deptName: "협업검사담당 (인천세관)",
                prefix: "032-454-",
                members: [
                    { name: "박봉선", role: "고용부(석면), 환경부(폐기물)", ext: "2082" },
                    { name: "주지원", role: "원안위(방사능), 산업부(삼상유도전동기)", ext: "2083" },
                    { name: "장희선", role: "과기부/전파원(전파법), 산림청(목재류)", ext: "2084" },
                    { name: "홍유미", role: "산업부/국표원(전기·생활용품, 어린이제품)", ext: "2085" },
                    { name: "이상량", role: "분석업무", ext: "2086" },
                    { name: "주현승", role: "분석업무", ext: "2087" }
                ]
            }
        ];

        const directory = document.getElementById('contactDirectory');

        function renderDirectory() {
            directory.innerHTML = '';
            customsData.forEach((dept, index) => {
                const deptDiv = document.createElement('div');
                deptDiv.className = 'department';
                
                // 부서명 헤더
                const deptTitle = document.createElement('div');
                deptTitle.className = 'dept-title';
                deptTitle.innerText = dept.deptName;
                deptTitle.onclick = () => toggleDept(index);
                
                // 직원 리스트
                const memberList = document.createElement('ul');
                memberList.className = 'member-list';
                memberList.id = `dept-list-${index}`;
                
                dept.members.forEach(member => {
                    const fullPhone = dept.prefix + member.ext;
                    const li = document.createElement('li');
                    li.className = 'member-item';
                    li.innerHTML = `
                        <div class="member-info">
                            <span class="member-name">${member.name}</span>
                            <span class="member-role">${member.role} (내선: ${member.ext})</span>
                        </div>
                        <a href="tel:${fullPhone.replace(/-/g, '')}" class="call-btn">통화</a>
                    `;
                    memberList.appendChild(li);
                });

                deptDiv.appendChild(deptTitle);
                deptDiv.appendChild(memberList);
                directory.appendChild(deptDiv);
            });
        }

        // 아코디언 메뉴 토글
        function toggleDept(index) {
            const list = document.getElementById(`dept-list-${index}`);
            const title = list.previousElementSibling;
            list.classList.toggle('active');
            title.classList.toggle('active');
        }

        // 검색 기능
        function filterContacts() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const departments = document.querySelectorAll('.department');

            departments.forEach((dept) => {
                let hasVisibleMember = false;
                const members = dept.querySelectorAll('.member-item');
                const deptTitleText = dept.querySelector('.dept-title').innerText.toLowerCase();

                members.forEach((member) => {
                    const memberText = member.innerText.toLowerCase();
                    if (memberText.includes(searchText) || deptTitleText.includes(searchText)) {
                        member.style.display = 'flex';
                        hasVisibleMember = true;
                    } else {
                        member.style.display = 'none';
                    }
                });

                // 검색어가 있고 매칭되는 데이터가 있으면 목록을 펼쳐줌
                const list = dept.querySelector('.member-list');
                const title = dept.querySelector('.dept-title');
                
                if (searchText !== '' && hasVisibleMember) {
                    dept.style.display = 'block';
                    list.classList.add('active');
                    title.classList.add('active');
                } else if (searchText === '') {
                    dept.style.display = 'block';
                    list.classList.remove('active');
                    title.classList.remove('active');
                    members.forEach(m => m.style.display = 'flex');
                } else {
                    dept.style.display = 'none';
                }
            });
        }

        // 초기 렌더링
        renderDirectory();
    </script>
</body>
